set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g default-shell /opt/homebrew/bin/fish

unbind C-b
set-option -g prefix C-\\
set-option -g repeat-time 0
set -g escape-time 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set -g detach-on-destroy off
set -g history-limit 1000000
set -g set-clipboard on
set -g status-position top

bind -n M-H previous-window
bind -n M-L next-window

bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
bind o run-shell "open #{pane_current_path}"
bind -r e kill-pane -a
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

set-window-option -g mode-keys vi

# Colors
color_bar="default"
color_fg="#c0caf5"
color_tab="#1e2030"
color_tab_active="#2a2b3d"
color_green="#9ece6a"
color_orange="#ff9e64"
color_blue="#7aa2f7"
color_purple="#bb9af7"
color_yellow="#e0af68"
color_comment="#565f89"
color_darkgray="#0d0e1a"

# Status bar
set -g status on
set -g status-interval 1
set -g status-justify left
set -g status-style "bg=default,fg=${color_fg}"
set -g status-bg default

# Left: session name pill
set -g status-left-length 50
set -g status-left "#[fg=${color_green},bg=${color_bar}]î‚¶#[fg=${color_darkgray},bg=${color_green},bold]  #S #[fg=${color_green},bg=${color_bar},nobold]î‚´ "

# Right: dir + datetime pill
set -g status-right-length 150
set -g status-right "#[fg=${color_tab},bg=${color_bar}]î‚¶#[fg=${color_comment},bg=${color_tab}]  #{b:pane_current_path} î‚´  #[fg=${color_blue},bg=${color_bar}]î‚¶#[fg=${color_darkgray},bg=${color_blue},bold]  %Y-%m-%d %H:%M #[fg=${color_blue},bg=${color_bar}]î‚´"

# Window tabs: inactive pill
set -g window-status-format "#[fg=${color_tab},bg=${color_bar}]î‚¶#[fg=${color_comment},bg=${color_tab}] #W #[fg=${color_tab},bg=${color_bar}]î‚´"

# Window tabs: active pill
set -g window-status-current-format "#[fg=${color_tab_active},bg=${color_bar}]î‚¶#[fg=${color_orange},bg=${color_tab_active},bold] #W #[fg=${color_tab_active},bg=${color_bar}]î‚´"

set -g window-status-separator " "

# Pane borders
set -g pane-border-style "fg=${color_tab_active}"
set -g pane-active-border-style "fg=${color_purple}"

# Message
set -g message-style "bg=${color_yellow},fg=${color_darkgray},bold"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'aserowy/tmux.nvim'

run '~/.tmux/plugins/tpm'
