set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g default-shell /opt/homebrew/bin/fish

unbind C-b
set-option -g prefix C-\\
set-option -g repeat-time 0
set -g escape-time 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

bind -n M-H previous-window
bind -n M-L next-window

# Reload settings
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
# Open current directory
bind o run-shell "open #{pane_current_path}"
bind -r e kill-pane -a
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

set-window-option -g mode-keys vi

# ── Colors (base: #343648) ────────────────────────────────────────────────
color_bg="#343648"
color_fg="#e8e9f0"
color_tab="#2a2c3d"
color_tab_active="#434560"
color_darkgray="#22233a"
color_green="#a9dc76"
color_orange="#fc9867"
color_pink="#ff6188"
color_yellow="#ffd866"
color_blue="#78dce8"
color_purple="#ab9df2"
color_comment="#6e7090"

# ── Status bar ───────────────────────────────────────────────────────────────
set -g status on
set -g status-interval 1
set -g status-justify left
set -g status-position bottom
set -g status-style "bg=${color_bg},fg=${color_fg}"

# Left: session name with filled chevron
set -g status-left-length 40
set -g status-left "#[bg=${color_green},fg=${color_darkgray},bold] #S #[bg=${color_tab},fg=${color_green},nobold]#[bg=${color_tab},fg=${color_fg}] #[bg=${color_bg},fg=${color_tab}] "

# Right: time | date | user
set -g status-right-length 120
set -g status-right "#[bg=${color_bg},fg=${color_tab}]#[bg=${color_tab},fg=${color_comment}] %H:%M #[bg=${color_tab},fg=${color_blue}]#[bg=${color_blue},fg=${color_darkgray},bold] %d %b #[bg=${color_blue},fg=${color_purple}]#[bg=${color_purple},fg=${color_darkgray},bold] #(whoami) "

# Window tabs with powerline triangles (matching lualine  )
set -g window-status-format "#[bg=${color_bg},fg=${color_tab},nobold,nounderscore,noitalics]#[bg=${color_tab},fg=${color_comment}] #I  #W #[bg=${color_bg},fg=${color_tab},nobold,nounderscore,noitalics]"
set -g window-status-current-format "#[bg=${color_bg},fg=${color_tab_active},nobold,nounderscore,noitalics]#[bg=${color_tab_active},fg=${color_orange},bold] #I  #W #[bg=${color_bg},fg=${color_tab_active},nobold,nounderscore,noitalics]"
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=${color_tab_active}"
set -g pane-active-border-style "fg=${color_orange}"

# Message / command line
set -g message-style "bg=${color_yellow},fg=${color_darkgray},bold"

# ── Plugins ────────────────────────────────────────────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'aserowy/tmux.nvim'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm'
